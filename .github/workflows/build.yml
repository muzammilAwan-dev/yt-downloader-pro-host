name: Build YTDLPHost

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore NuGet packages
        run: dotnet restore YTDLPHost.sln
        
      - name: Build Solution
        run: dotnet build YTDLPHost.sln --configuration Release --no-restore
        
      - name: Publish Single-File EXE
        run: |
          dotnet publish YTDLPHost/YTDLPHost.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./publish
            
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDLPHost-Release
          path: ./publish/YTDLPHost.exe
